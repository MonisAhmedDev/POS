name: Docker Image CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  IMAGE_NAME: ferozkhandev/fastbite-app

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker image build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run backend tests
        working-directory: fastfoodbackend
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

      - name: Run shell syntax checks
        run: sh -n setup/setup.sh scripts/publish-multiarch.sh tests/setup/test_setup_sh_waits_for_health.sh

      - name: Run setup regression test
        run: sh tests/setup/test_setup_sh_waits_for_health.sh

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - test
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Git tags
        run: git fetch --force --tags

      - name: Compute image tags
        id: image_tags
        shell: bash
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::12}"

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:sha-${short_sha}"

            while IFS= read -r git_tag; do
              if [[ -n "${git_tag}" && "${git_tag}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
                echo "${IMAGE_NAME}:${git_tag}"
              elif [[ -n "${git_tag}" ]]; then
                echo "Skipping non-Docker-compatible git tag: ${git_tag}" >&2
              fi
            done < <(git tag --points-at "${GITHUB_SHA}")

            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

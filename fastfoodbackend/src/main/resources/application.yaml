server:
  port: ${SERVER_PORT:9090}

spring:
  application:
    name: pos
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fastbite?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:fastbite}
    password: ${SPRING_DATASOURCE_PASSWORD:fastbite}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt-secret: ${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
    access-token-minutes: ${APP_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${APP_REFRESH_TOKEN_DAYS:7}
    secure-cookies: ${APP_SECURE_COOKIES:false}
  storage:
    upload-dir: ${APP_UPLOAD_DIR:/data/uploads}
  bootstrap-admin:
    name: ${APP_BOOTSTRAP_ADMIN_NAME:FastBite Admin}
    email: ${APP_BOOTSTRAP_ADMIN_EMAIL:admin@fastfood.com}
    password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:admin123}

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: fastbite
      MYSQL_USER: fastbite
      MYSQL_PASSWORD: fastbite
      MYSQL_ROOT_PASSWORD: fastbite-root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fastbite-app:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/fastbite?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: fastbite
      SPRING_DATASOURCE_PASSWORD: fastbite
      APP_UPLOAD_DIR: /data/uploads
      APP_JWT_SECRET: change-me-change-me-change-me-change-me
      APP_SECURE_COOKIES: "false"
      APP_BOOTSTRAP_ADMIN_NAME: FastBite Admin
      APP_BOOTSTRAP_ADMIN_EMAIL: admin@fastfood.com
      APP_BOOTSTRAP_ADMIN_PASSWORD: admin123
    volumes:
      - food_photos:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s

volumes:
  mysql_data:
  food_photos:
